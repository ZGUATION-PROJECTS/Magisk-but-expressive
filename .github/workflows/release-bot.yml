name: Release Bot

on:
  workflow_dispatch:
    inputs:
      native_release_id:
        description: "Local native binary folder under asset/binaries/releases. Empty means latest by manifest versionCode"
        required: false
        default: ""
      release_suffix:
        description: "MBE suffix appended to the Magisk alpha version (empty for auto-increment)"
        required: false
        default: ""
      version_code_offset:
        description: "Optional MBE version offset. Empty means the trailing number in release_suffix"
        required: false
        default: ""
      release_tag:
        description: "APK release tag. Empty means v<version>"
        required: false
        default: ""
      changelog:
        description: "Changelog file used for release notes"
        required: true
        default: "docs/app_changes.md"
      publish:
        description: "Create/update the GitHub release"
        type: boolean
        required: true
        default: true
      prerelease:
        description: "Mark GitHub release as prerelease"
        type: boolean
        required: true
        default: false
      telegram:
        description: "Send Telegram channel notification after publishing"
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: self-hosted
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          is-asset-build: true

      - name: Prepare native binaries
        id: prepare
        run: |
          mkdir -p release-bot
          python scripts/release_bot.py prepare \
            --native-release-id "${{ inputs.native_release_id || '' }}" \
            --release-suffix "${{ inputs.release_suffix || '' }}" \
            --version-code-offset "${{ inputs.version_code_offset || '' }}"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        shell: bash
        run: |
          if [[ -n "$KEYSTORE_BASE64" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release-key.jks
            echo "KEYSTORE_FILE=release-key.jks" >> "$GITHUB_ENV"
          else
            echo "No keystore provided, building unsigned APK."
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./build.py -vr app

      - name: Package release files
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.prepare.outputs.version }}"
          tag="${{ inputs.release_tag || '' }}"
          if [[ -z "$tag" ]]; then
            tag="v${version}"
          fi
          apk_asset="Magisk-v${version}.apk"
          cp out/app-release.apk "release-bot/${apk_asset}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "apk_asset=${apk_asset}" >> "$GITHUB_OUTPUT"

      - name: Generate release metadata
        id: notes
        run: |
          python scripts/release_bot.py notes \
            --metadata "${{ steps.prepare.outputs.metadata }}" \
            --repo "${{ github.repository }}" \
            --tag "${{ steps.package.outputs.tag }}" \
            --apk-asset "${{ steps.package.outputs.apk_asset }}" \
            --changelog "${{ inputs.changelog || 'docs/app_changes.md' }}" \
            --out-dir release-bot

      - name: Commit and push changes
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        shell: bash
        run: |
          set -euo pipefail
          cp release-bot/update.json update.json
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          if ! git diff --exit-code update.json; then
            git add update.json
            git commit -m "Auto-update update.json for release ${{ steps.package.outputs.tag }}"
            git push origin HEAD:master
          else
            echo "No changes in update.json to commit"
          fi

      - name: Create or update GitHub release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.package.outputs.tag }}"
          args=(release-bot/release.md release-bot/update.json "release-bot/${{ steps.package.outputs.apk_asset }}")
          release_flags=()
          if [[ "${{ inputs.prerelease || 'true' }}" == "true" ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --repo "${{ github.repository }}" \
              --title "${{ steps.notes.outputs.title }}" \
              --notes-file release-bot/release.md \
              "${release_flags[@]}"
            gh release upload "$tag" "${args[@]}" --repo "${{ github.repository }}" --clobber
          else
            gh release create "$tag" "${args[@]}" \
              --repo "${{ github.repository }}" \
              --title "${{ steps.notes.outputs.title }}" \
              --notes-file release-bot/release.md \
              "${release_flags[@]}"
          fi

      - name: Upload runner artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-bot-${{ steps.package.outputs.tag }}
          path: release-bot
          compression-level: 9

      - name: Notify Telegram
        if: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)) && inputs.telegram }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          if [[ -n "$TELEGRAM_BOT_TOKEN" && -n "$TELEGRAM_CHAT_ID" ]]; then
            python scripts/release_bot.py telegram --message release-bot/telegram.md --photo "${{ steps.notes.outputs.release_photo }}"
          else
            echo "Telegram credentials not provided, skipping notification."
          fi

      - name: Clean sensitive files
        if: always()
        run: |
          rm -f release-key.jks

      - name: Stop gradle daemon
        if: always()
        run: ./app/gradlew --stop
